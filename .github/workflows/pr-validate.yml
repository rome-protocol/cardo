# Lightweight PR-time gate. Runs on every PR and catches code-level
# regressions (npm install conflicts, type errors, broken next build,
# eslint regressions) without paying for the full Docker build.
#
# Cardo-specific notes:
# - --legacy-peer-deps is required: next@15 declares an -rc React peer;
#   cardo runs stable React 19. See Dockerfile + cardo/CLAUDE.md.
# - @rome-protocol/registry is a PUBLIC github: dep. npm/pacote clones
#   github: deps over ssh by default, so we rewrite github ssh->https
#   (public repo, no credentials) and `npm ci` against the committed
#   lockfile pin — which is also what the chain-config / solana-programs
#   freshness tests assert the committed JSON was projected from.

name: PR validate

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Match Dockerfile (node:25-alpine). Bump in lockstep.
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # npm/pacote clones github: deps over ssh by default; rewrite to
        # https so the public @rome-protocol/registry pin installs without
        # credentials, then install against the committed lockfile.
        run: |
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
          git config --global --add url."https://github.com/".insteadOf git@github.com:
          npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Type-check (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Unit tests (vitest L1 — incl. the for-each coverage contract)
        run: npm test

      - name: Build (next build)
        run: npm run build
